spring:
  application:
    name: life-server
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/life?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: CHANGE_ME
    password: CHANGE_ME
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
    password: CHANGE_ME
    database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  auth:
    token-prefix: "life:token:"
    token-ttl-seconds: 2592000
    header-name: Authorization
  fridge:
    expiring-days: 3
  wechat:
    app-id: CHANGE_ME
    app-secret: CHANGE_ME
    subscription-template-id: CHANGE_ME
    reminder-page: pages/fridge/index
    template-fields:
      product-name: CHANGE_ME
      expiry-date: CHANGE_ME
      remaining-days: CHANGE_ME
      inventory-quantity: CHANGE_ME
      remark: CHANGE_ME
