spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/life?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456

app:
  ocr:
    enabled: true
    provider: aliyun
    api-key: change-me
    endpoint: ocr-api.cn-hangzhou.aliyuncs.com
    region: cn-hangzhou
    access-key-id: change-me
    access-key-secret: change-me
  oss:
    enabled: true
    endpoint: oss-cn-hangzhou.aliyuncs.com
    region: cn-hangzhou
    bucket: life-zy
    public-domain: https://life-zy.oss-cn-hangzhou.aliyuncs.com
    cover-dir: recipe-covers
    max-size-bytes: 2097152
    policy-expire-seconds: 300
    read-url-expire-seconds: 1800
    access-key-id: change-me
    access-key-secret: change-me
  wechat:
    app-id: your-app-id
    app-secret: your-app-secret
    subscription-template-id: your-template-id
    reminder-page: pages/fridge/index
    template-fields:
      product-name: thing1
      expiry-date: date2
      remaining-days: thing3
      inventory-quantity: number4
      remark: thing5
